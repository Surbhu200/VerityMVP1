[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"
  SECRETS_SCAN_OMIT_KEYS = "AI_PROVIDER,OPENAI_MODEL,BRIGHT_DATA_AMAZON_DATASET_ID,BRIGHT_DATA_SYNC_TIMEOUT_MS,LOCAL_RESEARCH_ENABLED,SEMANTIC_SCHOLAR_DISABLE_ANON"

[[plugins]]
  package = "@netlify/plugin-nextjs"
